<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(160deg, #1e3a5f 0%, #1a73e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      max-width: 520px;
      width: 100%;
      color: #fff;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    .location-form { display: flex; gap: 0.4rem; }

    .location-input {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      color: #fff;
      font-size: 0.82rem;
      font-family: 'Roboto', sans-serif;
      outline: none;
      width: 150px;
    }

    .location-input::placeholder { color: rgba(255,255,255,0.5); }

    .btn-search {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: #fff;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'Roboto', sans-serif;
      transition: background 0.2s;
    }

    .btn-search:hover { background: rgba(255,255,255,0.3); }

    .card-body { padding: 1.75rem 1.75rem 1.5rem; }

    .current {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .weather-icon  { font-size: 5rem; line-height: 1; }

    .temp-block    { flex: 1; min-width: 120px; }

    .temp {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 300;
      line-height: 1;
    }

    .temp-unit {
      font-size: 1.5rem;
      vertical-align: super;
      opacity: 0.6;
    }

    .feels-like { font-size: 0.85rem; opacity: 0.7; margin-top: 0.2rem; }

    .condition-block { text-align: right; }

    .condition {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 500;
      line-height: 1.2;
    }

    .city-name { font-size: 1rem; opacity: 0.75; margin-top: 0.2rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.4rem;
    }

    .stat {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      text-align: center;
    }

    .stat-icon  { font-size: 1.3rem; }
    .stat-value { font-size: 0.95rem; font-weight: 500; margin-top: 0.2rem; }
    .stat-label { font-size: 0.65rem; opacity: 0.65; margin-top: 0.1rem; letter-spacing: 0.08em; text-transform: uppercase; }

    .forecast-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
    }

    .forecast-item {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
      text-align: center;
      min-width: 65px;
      flex-shrink: 0;
    }

    .f-day  { font-size: 0.7rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }
    .f-icon { font-size: 1.4rem; margin: 0.3rem 0; }
    .f-hi   { font-size: 0.9rem; font-weight: 500; }
    .f-lo   { font-size: 0.75rem; opacity: 0.6; }

    .toggle-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
      gap: 0.5rem;
    }

    .unit-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Roboto', sans-serif;
      transition: all 0.2s;
    }

    .unit-btn.active {
      background: rgba(255,255,255,0.25);
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }

    .loading-state, .error-state {
      text-align: center;
      padding: 3rem 1rem;
      opacity: 0.75;
    }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="header-label">☁️ Weather</span>
      <div class="location-form">
        <input class="location-input" id="city-input" type="text"
               placeholder="City, Country" onkeydown="if(event.key==='Enter') search()" />
        <button class="btn-search" onclick="search()">Go</button>
      </div>
    </div>
    <div class="card-body">
      <div id="weather-content">
        <div class="loading-state">
          <div class="spinner"></div>
          <div>Loading weather…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Matches DEFAULT_UNITS in Code.gs
    var currentUnit = 'imperial';
    var currentCity = '';

    var ICONS = {
      '01d':'☀️','01n':'🌙','02d':'⛅','02n':'🌙','03d':'☁️','03n':'☁️',
      '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
      '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
    };

    var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function unitLabel()  { return currentUnit === 'imperial' ? '°F' : '°C'; }
    function speedLabel() { return currentUnit === 'imperial' ? 'mph' : 'm/s'; }

    function search() {
      var v = document.getElementById('city-input').value.trim();
      if (v) currentCity = v;
      fetchWeather();
    }

    function fetchWeather() {
      showLoading();
      google.script.run
        .withSuccessHandler(onWeatherData)
        .withFailureHandler(function(e) { showError(e.message); })
        .getWeather(currentCity, currentUnit);
    }

    function onWeatherData(result) {
      if (result.error) { showError(result.error); return; }
      renderWeather(result.weather, result.forecast);
    }

    function renderWeather(w, f) {
      var icon      = ICONS[w.weather[0].icon] || '🌡️';
      var unit      = unitLabel();
      var speed     = speedLabel();
      var feelsTemp = Math.round(w.main.feels_like);
      var mainTemp  = Math.round(w.main.temp);
      var vis       = w.visibility ? (w.visibility / 1000).toFixed(1) + ' km' : 'N/A';
      var sunrise   = new Date(w.sys.sunrise * 1000).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      var sunset    = new Date(w.sys.sunset  * 1000).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

      var dailyMap = {};
      ((f && f.list) || []).forEach(function(item) {
        var d   = new Date(item.dt * 1000);
        var key = d.toDateString();
        if (!dailyMap[key]) dailyMap[key] = { min: item.main.temp_min, max: item.main.temp_max, icon: item.weather[0].icon, day: d.getDay() };
        else {
          dailyMap[key].min = Math.min(dailyMap[key].min, item.main.temp_min);
          dailyMap[key].max = Math.max(dailyMap[key].max, item.main.temp_max);
        }
      });
      var forecastDays = Object.values(dailyMap).slice(1, 6);
      var forecastHtml = forecastDays.map(function(d) {
        return '<div class="forecast-item">'
          + '<div class="f-day">'  + DAY_NAMES[d.day] + '</div>'
          + '<div class="f-icon">' + (ICONS[d.icon] || '🌡️') + '</div>'
          + '<div class="f-hi">'   + Math.round(d.max) + unit + '</div>'
          + '<div class="f-lo">'   + Math.round(d.min) + unit + '</div>'
          + '</div>';
      }).join('');

      document.getElementById('weather-content').innerHTML =
        '<div class="current">'
        + '<div class="weather-icon">' + icon + '</div>'
        + '<div class="temp-block">'
          + '<div class="temp">' + mainTemp + '<span class="temp-unit">' + unit + '</span></div>'
          + '<div class="feels-like">Feels like ' + feelsTemp + unit + '</div>'
        + '</div>'
        + '<div class="condition-block">'
          + '<div class="condition">' + w.weather[0].description.replace(/\b\w/g, function(c){ return c.toUpperCase(); }) + '</div>'
          + '<div class="city-name">' + w.name + ', ' + w.sys.country + '</div>'
        + '</div>'
        + '</div>'
        + '<div class="stats">'
          + '<div class="stat"><div class="stat-icon">💧</div><div class="stat-value">' + w.main.humidity + '%</div><div class="stat-label">Humidity</div></div>'
          + '<div class="stat"><div class="stat-icon">💨</div><div class="stat-value">' + Math.round(w.wind.speed) + ' ' + speed + '</div><div class="stat-label">Wind</div></div>'
          + '<div class="stat"><div class="stat-icon">👁️</div><div class="stat-value">' + vis + '</div><div class="stat-label">Visibility</div></div>'
          + '<div class="stat"><div class="stat-icon">📊</div><div class="stat-value">' + w.main.pressure + ' hPa</div><div class="stat-label">Pressure</div></div>'
          + '<div class="stat"><div class="stat-icon">🌅</div><div class="stat-value">' + sunrise + '</div><div class="stat-label">Sunrise</div></div>'
          + '<div class="stat"><div class="stat-icon">🌇</div><div class="stat-value">' + sunset + '</div><div class="stat-label">Sunset</div></div>'
        + '</div>'
        + (forecastHtml ? '<div class="forecast-row">' + forecastHtml + '</div>' : '')
        + '<div class="toggle-row">'
          + '<button class="unit-btn ' + (currentUnit==='imperial'?'active':'') + '" onclick="setUnit(\'imperial\')">°F</button>'
          + '<button class="unit-btn ' + (currentUnit==='metric'?'active':'') + '" onclick="setUnit(\'metric\')">°C</button>'
        + '</div>';
    }

    function setUnit(unit) {
      if (currentUnit === unit) return;
      currentUnit = unit;
      fetchWeather();
    }

    function showLoading() {
      document.getElementById('weather-content').innerHTML =
        '<div class="loading-state"><div class="spinner"></div><div>Loading…</div></div>';
    }

    function showError(msg) {
      document.getElementById('weather-content').innerHTML =
        '<div class="error-state">⚠️ ' + (msg || 'Could not load weather.') + '</div>';
    }

    // Auto-load on start
    fetchWeather();
  </script>
</body>
</html>
