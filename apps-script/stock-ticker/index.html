<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Ticker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Roboto:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ticker-height: 48px;
      --ticker-bg:     #0d0d0d;
      --up-color:      #22c55e;
      --down-color:    #ef4444;
      --flat-color:    #94a3b8;
      --speed:         35s;
    }

    body {
      background: var(--ticker-bg);
      overflow: hidden;
      height: var(--ticker-height);
      font-family: 'Roboto', sans-serif;
    }

    .ticker-wrap {
      width: 100%;
      height: var(--ticker-height);
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    .ticker-label {
      flex-shrink: 0;
      background: #1a3a1a;
      color: var(--up-color);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
      z-index: 2;
      box-shadow: 4px 0 8px rgba(0,0,0,0.6);
      border-right: 1px solid #1f3a1f;
    }

    .ticker-body {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }

    .ticker-body::before,
    .ticker-body::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 30px;
      z-index: 1;
      pointer-events: none;
    }

    .ticker-body::before { left: 0;  background: linear-gradient(to right, var(--ticker-bg), transparent); }
    .ticker-body::after  { right: 0; background: linear-gradient(to left,  var(--ticker-bg), transparent); }

    .ticker-scroll {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: scroll-left var(--speed) linear infinite;
      will-change: transform;
    }

    .ticker-scroll:hover { animation-play-state: paused; }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .stock-item {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0 1.1rem;
      cursor: default;
      user-select: none;
    }

    .stock-symbol {
      font-family: 'Roboto Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      color: #cbd5e1;
      letter-spacing: 0.05em;
    }

    .stock-price {
      font-family: 'Roboto Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
    }

    .stock-change {
      font-family: 'Roboto Mono', monospace;
      font-size: 0.75rem;
    }

    .stock-change.up   { color: var(--up-color);   }
    .stock-change.down { color: var(--down-color);  }
    .stock-change.flat { color: var(--flat-color);  }

    .simulated-badge {
      font-size: 0.6rem;
      color: #475569;
      background: #1a1a1a;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      margin-left: 0.3rem;
    }

    .divider { color: #222; font-size: 1.2rem; padding: 0 0.2rem; user-select: none; }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="ticker-label">📈 STOCKS</div>
    <div class="ticker-body">
      <div class="ticker-scroll" id="ticker-scroll">
        <span class="stock-item"><span class="stock-symbol">Loading…</span></span>
      </div>
    </div>
  </div>

  <script>
    var isSimulated = false;

    function renderTicker(quotes) {
      if (!quotes || quotes.length === 0) return;

      isSimulated = quotes.some(function(q) { return q.simulated; });

      var items = quotes.concat(quotes); // duplicate for seamless loop
      var html  = items.map(function(s, i) {
        var chg      = s.changePct;
        var cls      = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
        var arrow    = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
        var sign     = chg >= 0 ? '+' : '';
        var pctStr   = chg != null ? sign + chg.toFixed(2) + '%' : '';
        var price    = s.price != null
          ? s.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
          : '—';
        var divider  = i > 0 ? '<span class="divider">|</span>' : '';
        var simBadge = s.simulated ? '<span class="simulated-badge">SIM</span>' : '';
        return divider +
          '<span class="stock-item">'
          + '<span class="stock-symbol">' + s.symbol + '</span>'
          + '<span class="stock-price">$' + price + simBadge + '</span>'
          + '<span class="stock-change ' + cls + '">' + arrow + ' ' + pctStr + '</span>'
          + '</span>';
      }).join('');

      document.getElementById('ticker-scroll').innerHTML = html;
    }

    // Fetch quotes via server-side Apps Script function
    google.script.run
      .withSuccessHandler(renderTicker)
      .withFailureHandler(function(e) {
        document.getElementById('ticker-scroll').innerHTML =
          '<span class="stock-item"><span class="stock-symbol">Error: ' + e.message + '</span></span>';
      })
      .getQuotes();

    // Refresh every 15 minutes
    setInterval(function() {
      google.script.run
        .withSuccessHandler(renderTicker)
        .getQuotes();
    }, 15 * 60 * 1000);
  </script>
</body>
</html>
